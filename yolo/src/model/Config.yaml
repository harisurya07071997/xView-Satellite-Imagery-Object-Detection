
dataset:
    yaml_file: "../dataset/data.yaml"

model:

    name: "yolo11x.pt"
    tuning_epochs: 75
    checkpoint: ""

    wandb:
        sweep_config:
            method: random

            metric:
                name: val/f1_score
                goal: maximize
            
            parameters:
                hsv_h:
                    min: 0.005
                    max: 0.015
                    distribution: uniform

                hsv_s:
                    min: 0.5
                    max: 0.7
                    distribution: uniform

                hsv_v:
                    min: 0.2
                    max: 0.4
                    distribution: uniform

                translate:
                    min: 0.05
                    max: 0.10
                    distribution: uniform
                
                scale:
                    min: 0.05
                    max: 0.30
                    distribution: uniform
                
                box:
                    min: 5
                    max: 7.5
                    distribution: uniform

                cls:
                    min: 0.50
                    max: 0.75
                    distribution: uniform

                dfl:
                    min: 1.25
                    max: 1.75
                    distribution: uniform

                lr0:
                    min: 0.0002
                    max: 0.002
                    distribution: log_uniform_values
                
                cos_lr:
                    values: [True, False]
                    
                mixup:
                    min: 0.0
                    max: 0.2
                    distribution: uniform
                
                cutmix:
                    min: 0.0
                    max: 0.2
                    distribution: uniform

    yolo:
        project: "xView-Satellite-Imagery-OD"
        
        epochs: 500
        warmup_epochs: 25
        patience: 150
        
        batch: 32
        imgsz: 512
        workers: 8
        device: "cpu"
        cache: False
        fraction: 1.0
        
        single_cls: False
        classes: [0, 1]
        rect: False
        multi_scale: False

        val: True
        save: True
        plots: True
        save_period: 5
        resume: False
        
        seed: 0
        deterministic: True
        amp: True
        compile: True
        profile: False

        optimizer: "AdamW"
        lr0: 0.0013875
        lrf: 0.01
        weight_decay: 0.0005
        momentum: 0.937
        cos_lr: True
        warmup_momentum: 0.8
        warmup_bias_lr: 0.1

        box: 5.30082
        cls: 0.68927
        dfl: 1.63021

        dropout: 0.1
        freeze: None

        hsv_h: 0.010742
        hsv_s: 0.61436
        hsv_v: 0.25144
        
        degrees: 0.0
        translate: 0.069993
        scale : 0.20706
        shear : 0.0
        perspective: 0.0
        flipud: 0.0
        fliplr: 0.5
        
        bgr: 0.0
        mixup : 0.067373
        cutmix: 0.19692
        mosaic: 1.0
        close_mosaic: 0.05
        